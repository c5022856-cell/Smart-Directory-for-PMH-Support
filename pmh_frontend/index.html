<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- App identity -->
    <title>PMH Support</title>
    <meta
      name="description"
      content="Perinatal Mental Health support hub — resources, community, and guidance."
    />
    <meta name="author" content="PMH Support Team" />

    <!-- Open Graph (link previews in WhatsApp/FB/Slack) -->
    <meta property="og:title" content="PMH Support" />
    <meta
      property="og:description"
      content="Perinatal Mental Health support hub — resources, community, and guidance."
    />
    <meta property="og:type" content="website" />
    <!-- Optional: replace with your own hosted image later -->
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter/X preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@pmhsupport" />
    <meta name="twitter:image" content="/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
